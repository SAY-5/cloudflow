spring:
  application:
    name: inventory
  datasource:
    url: ${INVENTORY_DB_URL:jdbc:h2:mem:inventory;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${INVENTORY_DB_USER:sa}
    password: ${INVENTORY_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
server:
  port: ${SERVER_PORT:8082}
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
