spring:
  application:
    name: gateway
  main:
    web-application-type: servlet
server:
  port: ${SERVER_PORT:8080}
cloudflow:
  services:
    orders: ${ORDERS_URL:http://localhost:8081}
    inventory: ${INVENTORY_URL:http://localhost:8082}
    assistant: ${ASSISTANT_URL:http://localhost:8084}
management:
  endpoints:
    web:
      exposure:
        include: health,info
