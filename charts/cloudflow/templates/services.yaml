{{- $global := .Values.global -}}
{{- $release := .Release.Name -}}
{{- range $key, $svc := .Values.services }}
{{- if and $svc.enabled (ne $key "dashboard") }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name | default $key }}
  labels:
    {{- include "cloudflow.labels" $ | nindent 4 }}
    {{- include "cloudflow.selectorLabels" (dict "name" ($svc.name | default $key) "release" $release) | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      {{- include "cloudflow.selectorLabels" (dict "name" ($svc.name | default $key) "release" $release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cloudflow.selectorLabels" (dict "name" ($svc.name | default $key) "release" $release) | nindent 8 }}
    spec:
      containers:
        - name: {{ $svc.name | default $key }}
          image: {{ include "cloudflow.image" (dict "global" $global "svc" $svc) }}
          imagePullPolicy: {{ $global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name | default $key }}
  labels:
    {{- include "cloudflow.labels" $ | nindent 4 }}
spec:
  selector:
    {{- include "cloudflow.selectorLabels" (dict "name" ($svc.name | default $key) "release" $release) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
{{- if and $svc.autoscaling $svc.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $svc.name | default $key }}
  labels:
    {{- include "cloudflow.labels" $ | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $svc.name | default $key }}
  minReplicas: {{ $svc.autoscaling.minReplicas }}
  maxReplicas: {{ $svc.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
{{- end }}
