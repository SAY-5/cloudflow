{{- $svc := .Values.services.dashboard -}}
{{- $global := .Values.global -}}
{{- $release := .Release.Name -}}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  labels:
    {{- include "cloudflow.labels" $ | nindent 4 }}
    {{- include "cloudflow.selectorLabels" (dict "name" $svc.name "release" $release) | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      {{- include "cloudflow.selectorLabels" (dict "name" $svc.name "release" $release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cloudflow.selectorLabels" (dict "name" $svc.name "release" $release) | nindent 8 }}
    spec:
      containers:
        - name: {{ $svc.name }}
          image: {{ include "cloudflow.image" (dict "global" $global "svc" $svc) }}
          imagePullPolicy: {{ $global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name }}
  labels:
    {{- include "cloudflow.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "cloudflow.selectorLabels" (dict "name" $svc.name "release" $release) | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end }}
