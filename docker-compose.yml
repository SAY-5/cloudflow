# Local end-to-end stack used by the Playwright e2e suite. The dashboard is
# served by nginx and proxies /api to the gateway, which fans out to the
# services and the assistant. Postgres uses the pgvector image.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cloudflow
      POSTGRES_USER: cloudflow
      POSTGRES_PASSWORD: cloudflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudflow"]
      interval: 3s
      timeout: 3s
      retries: 20

  orders:
    build:
      context: .
      dockerfile: orders-service/Dockerfile
    environment:
      ORDERS_DB_URL: jdbc:postgresql://postgres:5432/cloudflow
      ORDERS_DB_USER: cloudflow
      ORDERS_DB_PASSWORD: cloudflow
    depends_on:
      postgres:
        condition: service_healthy

  inventory:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    environment:
      INVENTORY_DB_URL: jdbc:postgresql://postgres:5432/cloudflow
      INVENTORY_DB_USER: cloudflow
      INVENTORY_DB_PASSWORD: cloudflow
    depends_on:
      postgres:
        condition: service_healthy

  log-collector:
    build:
      context: .
      dockerfile: log-collector/Dockerfile
    environment:
      RAG_DB_URL: jdbc:postgresql://postgres:5432/cloudflow
      RAG_DB_USER: cloudflow
      RAG_DB_PASSWORD: cloudflow
    depends_on:
      postgres:
        condition: service_healthy

  ops-assistant:
    build:
      context: .
      dockerfile: ops-assistant/Dockerfile
    environment:
      RAG_DB_URL: jdbc:postgresql://postgres:5432/cloudflow
      RAG_DB_USER: cloudflow
      RAG_DB_PASSWORD: cloudflow
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      ORDERS_URL: http://orders:8081
      INVENTORY_URL: http://inventory:8082
      COLLECTOR_URL: http://log-collector:8083
      ASSISTANT_URL: http://ops-assistant:8084
    depends_on:
      - orders
      - inventory
      - log-collector
      - ops-assistant

  dashboard:
    build:
      context: dashboard
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - gateway
