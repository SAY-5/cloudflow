name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Spotless check
        run: ./mvnw -B spotless:check

  build-test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test (JUnit + Testcontainers)
        run: ./mvnw -B verify

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit test
        run: npm run test
      - name: Build
        run: npm run build

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
      - name: helm lint
        run: helm lint charts/cloudflow
      - name: helm template | kubeconform -strict
        run: |
          helm template cloudflow charts/cloudflow | kubeconform -strict -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start the stack
        run: docker compose up -d --build
      - name: Wait for the gateway and seed data
        run: |
          for i in $(seq 1 60); do
            if curl -sf localhost:8080/ >/dev/null; then break; fi
            sleep 5
          done
          # Seed a couple of log lines so the assistant has grounding context.
          curl -sf -XPOST localhost:8080/api/health || true
          curl -s -XPOST http://localhost:8080/api/assist \
            -H 'content-type: application/json' \
            -d '{"question":"how do I roll back inventory?"}' || true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dashboard deps and browsers
        working-directory: dashboard
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright e2e
        working-directory: dashboard
        env:
          E2E_BASE_URL: http://localhost:8080
        run: npm run e2e
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

  build-images:
    runs-on: ubuntu-latest
    needs: [build-test-java, web]
    steps:
      - uses: actions/checkout@v4
      - name: Build service images
        run: |
          docker build -t cloudflow/orders:ci -f orders-service/Dockerfile .
          docker build -t cloudflow/inventory:ci -f inventory-service/Dockerfile .
          docker build -t cloudflow/gateway:ci -f gateway/Dockerfile .
          docker build -t cloudflow/log-collector:ci -f log-collector/Dockerfile .
          docker build -t cloudflow/ops-assistant:ci -f ops-assistant/Dockerfile .
          docker build -t cloudflow/dashboard:ci dashboard
